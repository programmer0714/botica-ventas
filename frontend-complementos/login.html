<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — Nova Salud</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-hint {
      margin-top: 20px;
      padding: 12px 16px;
      background: rgba(0,201,167,0.08);
      border: 1.5px solid rgba(0,201,167,0.25);
      border-radius: 8px;
      font-size: 12px;
      color: #2d6a4f;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .login-hint code {
      background: rgba(0,201,167,0.15);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper .toggle-pw {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">💊</div>
        <div class="login-logo-text">
          <h2>Nova Salud</h2>
          <p>Sistema de Ventas</p>
        </div>
      </div>

      <h1 class="login-title">Bienvenido</h1>
      <p class="login-sub">Ingresa tus credenciales para continuar</p>

      <!-- Error -->
      <div class="error-msg" id="error-msg">⚠ Usuario o contraseña incorrectos.</div>

      <!-- Formulario -->
      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <input
          class="form-input"
          type="text"
          id="username"
          placeholder="Ingresa tu usuario"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrapper">
          <input
            class="form-input"
            type="password"
            id="password"
            placeholder="••••••"
            autocomplete="current-password"
            style="padding-right: 44px;"
          />
          <button class="toggle-pw" id="toggle-pw" type="button" title="Mostrar/ocultar contraseña">👁</button>
        </div>
      </div>

      <button class="btn-login" id="btn-login">Ingresar al sistema</button>

      <div class="login-hint">
        💡 Demo: usuario <code>admin</code> / clave <code>123456</code>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Si ya está logueado, redirigir
    if (getSession()?.loggedIn) window.location.href = 'index.html';

    const btnLogin  = document.getElementById('btn-login');
    const errorMsg  = document.getElementById('error-msg');
    const togglePw  = document.getElementById('toggle-pw');
    const pwInput   = document.getElementById('password');

    // Toggle mostrar/ocultar contraseña
    togglePw.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      togglePw.textContent = isText ? '👁' : '🙈';
    });

    // Login al hacer click
    btnLogin.addEventListener('click', doLogin);

    // Login con Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      errorMsg.classList.remove('show');

      if (!user || !pass) {
        errorMsg.textContent = '⚠ Por favor completa todos los campos.';
        errorMsg.classList.add('show');
        return;
      }

      btnLogin.textContent = 'Verificando...';
      btnLogin.disabled = true;

      // Pequeño delay para simular verificación
      setTimeout(() => {
        const result = login(user, pass);
        if (result.success) {
          btnLogin.textContent = '✔ Acceso concedido';
          setTimeout(() => { window.location.href = 'index.html'; }, 400);
        } else {
          errorMsg.textContent = '⚠ ' + result.message;
          errorMsg.classList.add('show');
          btnLogin.textContent = 'Ingresar al sistema';
          btnLogin.disabled = false;
        }
      }, 600);
    }
  </script>
</body>
</html>
